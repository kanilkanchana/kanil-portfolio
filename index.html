<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfolio | AI & Robotics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg-base: #030305; --primary-glow: #4facfe; --secondary-glow: #00f2fe; --text-main: #f8f9fa; --text-muted: #a0a0ab; --glass-border: rgba(255, 255, 255, 0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-base); color: var(--text-main); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        #tech-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; opacity: 0.12; }
        .bg-symbol { position: absolute; font-family: 'Space Grotesk', monospace; color: var(--primary-glow); animation: driftUp linear infinite; }
        @keyframes driftUp { 0% { transform: translateY(110vh); opacity: 0; } 10% { opacity: 0.5; } 90% { opacity: 0.5; } 100% { transform: translateY(-10vh); opacity: 0; } }
        .skill-tag { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); padding: 8px 14px; border-radius: 8px; display: inline-flex; align-items: center; gap: 8px; margin: 4px; font-size: 13px; transition: 0.3s; }
        .skill-tag i { color: var(--secondary-glow); animation: iconPulse 3s infinite ease-in-out; }
        @keyframes iconPulse { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.2); opacity: 1; } }
        nav, section, footer { position: relative; z-index: 10; }
        h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }
        .gradient-text { background: linear-gradient(135deg, var(--primary-glow), var(--secondary-glow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        nav { position: fixed; top: 0; width: 100%; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(3, 3, 5, 0.85); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid var(--glass-border); }
        .logo { font-size: 20px; font-weight: 700; color: #fff; text-decoration: none; }
        section { padding: 80px 6%; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .hero h1 { font-size: clamp(32px, 8vw, 60px); line-height: 1.1; margin-bottom: 15px; }
        .hero-avatar { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--primary-glow); margin-bottom: 15px; object-fit: cover; display: none; }
        .glass-card { background: rgba(15, 15, 20, 0.7); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .project-card { background: rgba(10, 10, 15, 0.8); border: 1px solid var(--glass-border); border-radius: 12px; overflow: hidden; }
        .project-img { height: 180px; background-size: cover; background-position: center; }
        .project-content { padding: 15px; }
        .reveal { opacity: 0; transform: translateY(20px); transition: 0.6s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        /* Floating Arrow */
        #scrollTop { position: fixed; bottom: 20px; right: 20px; width: 45px; height: 45px; background: var(--primary-glow); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; z-index: 1000; opacity: 0; transition: 0.3s; box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4); }
        #scrollTop.show { opacity: 1; }
        @media (max-width: 480px) { section { padding-top: 100px; } .hero h1 { font-size: 34px; } }
    </style>
</head>
<body>
    <div id="tech-bg"></div>
    <nav><a href="#" class="logo" id="navLogo">PORTFOLIO</a><div style="display:flex;gap:15px;"><a href="#about" style="color:var(--text-muted);text-decoration:none;font-size:12px;">About</a><a href="#projects" style="color:var(--text-muted);text-decoration:none;font-size:12px;">Projects</a></div></nav>
    <a href="#" id="scrollTop"><i class="fa-solid fa-arrow-up"></i></a>
    <section class="hero" id="home"><div class="reveal active"><img id="displayPhoto" class="hero-avatar" src="" alt="Profile"><div id="displayCourse" style="color:var(--secondary-glow);font-size:12px;letter-spacing:1px;margin-bottom:8px;"></div><h1>Hi, I'm <span id="displayName" style="color:#fff;">...</span>.<br>I specialize in : <br> <span class="gradient-text" id="typewriter"></span></h1><p id="displayJourney" style="max-width:600px;color:var(--text-muted);margin-top:15px;font-size:15px;"></p></div></section>
    <section id="about"><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;"><div class="glass-card reveal"><h3>Technical Skills</h3><div id="skillsContainer" style="margin-top:15px;"></div></div><div class="glass-card reveal"><h3>Development Focus</h3><p id="displayFocus" style="color:var(--text-muted);font-size:14px;line-height:1.6;"></p></div></div></section>
    <section id="projects"><h2>Featured Work</h2><div class="projects-grid" id="projectsContainer"></div></section>
    <footer style="padding:40px;text-align:center;border-top:1px solid var(--glass-border);font-size:12px;color:var(--text-muted);" id="footerName"></footer>
    <script>
        function initTechBackground() {
            const bg = document.getElementById('tech-bg');
            const items = ['{ }', '</>', '🤖', '⚙️', '∑', '0101', 'ptr'];
            for (let i = 0; i < 25; i++) {
                let el = document.createElement('div'); el.className = 'bg-symbol';
                el.innerText = items[Math.floor(Math.random() * items.length)];
                el.style.left = Math.random() * 100 + 'vw'; el.style.fontSize = '14px';
                el.style.animationDuration = (Math.random() * 20 + 10) + 's';
                el.style.animationDelay = (Math.random() * 10) + 's'; bg.appendChild(el);
            }
        }
        let typewriterWords = [];
        document.addEventListener("DOMContentLoaded", () => {
            initTechBackground();
            fetch('data.json').then(res => res.json()).then(data => {
                document.getElementById('navLogo').innerText = data.profile.fullName.split(' ')[0].toUpperCase();
                document.getElementById('displayName').innerText = data.profile.fullName;
                document.getElementById('displayCourse').innerText = data.profile.courseTitle;
                document.getElementById('displayJourney').innerText = data.profile.journeyText;
                document.getElementById('displayFocus').innerText = data.profile.devFocus || "Integrating clean code with intelligent ML models.";
                document.getElementById('footerName').innerText = `© ${new Date().getFullYear()} ${data.profile.fullName}`;
                if(data.profile.photoUrl) { const img = document.getElementById('displayPhoto'); img.src = data.profile.photoUrl; img.style.display = 'block'; }
                typewriterWords = data.typewriterWords; startTypewriter();
                const sCont = document.getElementById('skillsContainer');
                data.skills.forEach(cat => {
                    let div = document.createElement('div'); div.style.marginBottom = "12px";
                    div.innerHTML = `<small style="color:var(--primary-glow);font-weight:700;display:block;margin-bottom:5px;">${cat.category}</small>`;
                    cat.items.forEach(s => { div.innerHTML += `<span class="skill-tag"><i class="${s.icon}"></i> ${s.name}</span>`; });
                    sCont.appendChild(div);
                });
                const pCont = document.getElementById('projectsContainer');
                data.projects.forEach(p => {
                    pCont.innerHTML += `<div class="project-card reveal"><div class="project-img" style="background-image:url('${p.imageUrl}')"></div><div class="project-content"><h4>${p.title}</h4><p style="font-size:12px;color:var(--text-muted);margin:10px 0;">${p.description}</p><a href="${p.linkUrl}" target="_blank" style="color:var(--primary-glow);text-decoration:none;font-size:12px;font-weight:bold;">View Project</a></div></div>`;
                });
            });
        });
        let wordIdx = 0, charIdx = 0, isDeleting = false;
        function startTypewriter() {
            const el = document.getElementById('typewriter'); const current = typewriterWords[wordIdx];
            el.textContent = isDeleting ? current.substring(0, charIdx - 1) : current.substring(0, charIdx + 1);
            charIdx = isDeleting ? charIdx - 1 : charIdx + 1;
            let speed = isDeleting ? 40 : 100;
            if (!isDeleting && charIdx === current.length) { speed = 2000; isDeleting = true; }
            else if (isDeleting && charIdx === 0) { isDeleting = false; wordIdx = (wordIdx + 1) % typewriterWords.length; speed = 500; }
            setTimeout(startTypewriter, speed);
        }
        window.addEventListener('scroll', () => {
            document.querySelectorAll('.reveal').forEach(el => { if (el.getBoundingClientRect().top < window.innerHeight - 50) el.classList.add('active'); });
            const btn = document.getElementById('scrollTop');
            if (window.scrollY > 300) btn.classList.add('show'); else btn.classList.remove('show');
        });
    </script>
</body>
</html>
