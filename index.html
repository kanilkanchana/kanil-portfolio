<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfolio | AI & Robotics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg-base: #030305; --primary-glow: #4facfe; --secondary-glow: #00f2fe; --text-main: #f8f9fa; --text-muted: #a0a0ab; --glass-border: rgba(255, 255, 255, 0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-base); color: var(--text-main); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        #tech-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; opacity: 0.1; }
        .bg-symbol { position: absolute; font-family: 'Space Grotesk', monospace; color: var(--primary-glow); animation: driftUp linear infinite; }
        @keyframes driftUp { 0% { transform: translateY(110vh); opacity: 0; } 10% { opacity: 0.5; } 100% { transform: translateY(-10vh); opacity: 0; } }

        /* Compact Navigation */
        nav { position: fixed; top: 0; width: 100%; padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(3, 3, 5, 0.9); backdrop-filter: blur(12px); z-index: 100; border-bottom: 1px solid var(--glass-border); height: 55px; }
        .logo { font-size: 18px; font-weight: 700; color: #fff; text-decoration: none; letter-spacing: 1px; }

        /* HERO - Reduced Top Space */
        section { padding: 40px 6%; position: relative; z-index: 10; }
        .hero { min-height: 90vh; display: flex; flex-direction: column; justify-content: center; padding-top: 60px; text-align: left; }
        
        .hero h1 { font-size: clamp(28px, 8vw, 55px); line-height: 1.1; margin-bottom: 10px; font-weight: 700; }
        .hero-avatar { width: 75px; height: 75px; border-radius: 50%; border: 2px solid var(--primary-glow); margin-bottom: 10px; object-fit: cover; display: none; box-shadow: 0 0 15px rgba(79, 172, 254, 0.3); }
        
        .gradient-text { background: linear-gradient(135deg, var(--primary-glow), var(--secondary-glow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Animated Down Arrow */
        .scroll-indicator { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 5px; color: var(--text-muted); text-decoration: none; font-size: 12px; transition: 0.3s; }
        .scroll-indicator i { font-size: 20px; color: var(--primary-glow); animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-8px); } 60% { transform: translateY(-4px); } }

        /* UI Cards */
        .glass-card { background: rgba(15, 15, 20, 0.7); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        .skill-tag { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); padding: 6px 12px; border-radius: 6px; display: inline-flex; align-items: center; gap: 6px; margin: 3px; font-size: 12px; }
        .skill-tag i { color: var(--secondary-glow); animation: iconPulse 3s infinite ease-in-out; }
        @keyframes iconPulse { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.2); opacity: 1; } }

        .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .project-card { background: rgba(10, 10, 15, 0.8); border: 1px solid var(--glass-border); border-radius: 10px; overflow: hidden; }
        .project-img { height: 160px; background-size: cover; background-position: center; }
        .project-content { padding: 15px; }

        .reveal { opacity: 0; transform: translateY(15px); transition: 0.5s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* Scroll Top Arrow */
        #scrollTop { position: fixed; bottom: 15px; right: 15px; width: 40px; height: 40px; background: var(--primary-glow); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; z-index: 1000; opacity: 0; transition: 0.3s; }
        #scrollTop.show { opacity: 1; }

        @media (max-width: 480px) { 
            .hero { padding-top: 20px; min-height: 85vh; }
            section { padding-top: 30px; padding-bottom: 10px; }
        }
    </style>
</head>
<body>
    <div id="tech-bg"></div>
    
    <nav>
        <a href="#" class="logo" id="navLogo">PORTFOLIO</a>
        <div style="display:flex;gap:12px;">
            <a href="#about" style="color:var(--text-muted);text-decoration:none;font-size:11px;font-weight:600;">ABOUT</a>
            <a href="#projects" style="color:var(--text-muted);text-decoration:none;font-size:11px;font-weight:600;">PROJECTS</a>
        </div>
    </nav>

    <a href="#" id="scrollTop"><i class="fa-solid fa-arrow-up"></i></a>
    
    <section class="hero" id="home">
        <div class="reveal active">
            <img id="displayPhoto" class="hero-avatar" src="" alt="Profile">
            <div id="displayCourse" style="color:var(--secondary-glow);font-size:11px;letter-spacing:1px;margin-bottom:5px;font-weight:600;"></div>
            <h1>Hi, I'm <span id="displayName" style="color:#fff;">...</span>.<br>I specialize in <span class="gradient-text" id="typewriter"></span></h1>
            <p id="displayJourney" style="max-width:580px;color:var(--text-muted);margin-top:10px;font-size:14px;line-height:1.6;"></p>
        </div>
        
        <a href="#about" class="scroll-indicator">
            <span>Scroll</span>
            <i class="fa-solid fa-chevron-down"></i>
        </a>
    </section>

    <section id="about">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:15px;">
            <div class="glass-card reveal">
                <h3 style="font-size:17px;margin-bottom:10px;color:var(--primary-glow);">Technical Skills</h3>
                <div id="skillsContainer"></div>
            </div>
            <div class="glass-card reveal">
                <h3 style="font-size:17px;margin-bottom:10px;color:var(--primary-glow);">Development Focus</h3>
                <p id="displayFocus" style="color:var(--text-muted);font-size:13px;line-height:1.5;"></p>
            </div>
        </div>
    </section>

    <section id="projects" style="padding-bottom:80px;">
        <h2 style="font-size:20px;margin-bottom:20px;" class="reveal">Featured Work</h2>
        <div class="projects-grid" id="projectsContainer"></div>
    </section>

    <footer style="padding:30px;text-align:center;border-top:1px solid var(--glass-border);font-size:11px;color:var(--text-muted);" id="footerName"></footer>

    <script>
        function initTechBackground() {
            const bg = document.getElementById('tech-bg');
            const items = ['{ }', '</>', '🤖', '01', 'ptr'];
            for (let i = 0; i < 20; i++) {
                let el = document.createElement('div'); el.className = 'bg-symbol';
                el.innerText = items[Math.floor(Math.random() * items.length)];
                el.style.left = Math.random() * 100 + 'vw'; el.style.fontSize = '12px';
                el.style.animationDuration = (Math.random() * 15 + 10) + 's';
                el.style.animationDelay = (Math.random() * 5) + 's'; bg.appendChild(el);
            }
        }
        let typewriterWords = [];
        document.addEventListener("DOMContentLoaded", () => {
            initTechBackground();
            fetch('data.json').then(res => res.json()).then(data => {
                document.getElementById('navLogo').innerText = data.profile.fullName.split(' ')[0].toUpperCase();
                document.getElementById('displayName').innerText = data.profile.fullName;
                document.getElementById('displayCourse').innerText = data.profile.courseTitle;
                document.getElementById('displayJourney').innerText = data.profile.journeyText;
                document.getElementById('displayFocus').innerText = data.profile.devFocus;
                document.getElementById('footerName').innerText = `© ${new Date().getFullYear()} ${data.profile.fullName}`;
                if(data.profile.photoUrl) { const img = document.getElementById('displayPhoto'); img.src = data.profile.photoUrl; img.style.display = 'block'; }
                typewriterWords = data.typewriterWords; startTypewriter();
                const sCont = document.getElementById('skillsContainer');
                data.skills.forEach(cat => {
                    let div = document.createElement('div'); div.style.marginBottom = "8px";
                    div.innerHTML = `<small style="color:var(--primary-glow);font-weight:700;display:block;margin-bottom:3px;font-size:10px;">${cat.category}</small>`;
                    cat.items.forEach(s => { div.innerHTML += `<span class="skill-tag"><i class="${s.icon}"></i> ${s.name}</span>`; });
                    sCont.appendChild(div);
                });
                const pCont = document.getElementById('projectsContainer');
                data.projects.forEach(p => {
                    pCont.innerHTML += `<div class="project-card reveal"><div class="project-img" style="background-image:url('${p.imageUrl}')"></div><div class="project-content"><h4>${p.title}</h4><p style="font-size:11px;color:var(--text-muted);margin:8px 0;">${p.description}</p><a href="${p.linkUrl}" target="_blank" style="color:var(--primary-glow);text-decoration:none;font-size:11px;font-weight:bold;">View Project</a></div></div>`;
                });
            });
        });
        let wordIdx = 0, charIdx = 0, isDeleting = false;
        function startTypewriter() {
            const el = document.getElementById('typewriter'); if (!el) return;
            const current = typewriterWords[wordIdx];
            el.textContent = isDeleting ? current.substring(0, charIdx - 1) : current.substring(0, charIdx + 1);
            charIdx = isDeleting ? charIdx - 1 : charIdx + 1;
            let speed = isDeleting ? 30 : 80;
            if (!isDeleting && charIdx === current.length) { speed = 1500; isDeleting = true; }
            else if (isDeleting && charIdx === 0) { isDeleting = false; wordIdx = (wordIdx + 1) % typewriterWords.length; speed = 400; }
            setTimeout(startTypewriter, speed);
        }
        window.addEventListener('scroll', () => {
            document.querySelectorAll('.reveal').forEach(el => { if (el.getBoundingClientRect().top < window.innerHeight - 30) el.classList.add('active'); });
            const btn = document.getElementById('scrollTop');
            if (window.scrollY > 200) btn.classList.add('show'); else btn.classList.remove('show');
        });
    </script>
</body>
</html>
