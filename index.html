<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Tech & AI</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root { 
            --bg-base: #030305; 
            --bg-surface: rgba(15, 15, 18, 0.7); 
            --primary-glow: #4facfe; 
            --secondary-glow: #00f2fe; 
            --text-main: #f8f9fa; 
            --text-muted: #a0a0ab; 
            --glass-border: rgba(255, 255, 255, 0.08); 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        
        body { 
            background-color: var(--bg-base); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
            line-height: 1.6; 
        }

        /* === REFINED DYNAMIC TECH BACKGROUND === */
        #tech-canvas {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        .bg-element {
            position: absolute;
            color: var(--primary-glow);
            font-family: 'Space Grotesk', monospace;
            opacity: 0;
            filter: blur(1px);
            animation: moveUp linear infinite;
        }

        /* Neural Network Node Style for ML */
        .ml-node {
            width: 4px; height: 4px;
            background: var(--secondary-glow);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--secondary-glow);
        }

        @keyframes moveUp {
            0% { transform: translateY(105vh) translateX(0); opacity: 0; }
            20% { opacity: 0.15; }
            80% { opacity: 0.15; }
            100% { transform: translateY(-10vh) translateX(20px); opacity: 0; }
        }

        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1;
            background-image: 
                linear-gradient(rgba(79, 172, 254, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(79, 172, 254, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        /* Ensure content is always above background */
        nav, section, footer { position: relative; z-index: 10; }

        /* === SLOW BREATHING SKILL TAGS === */
        .skill-tag { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid var(--glass-border); 
            padding: 8px 16px; border-radius: 8px; 
            font-size: 13px; display: inline-flex; align-items: center; gap: 8px; 
            margin: 5px;
            transition: all 0.5s ease;
            animation: slowFloat 6s infinite ease-in-out; /* Slower 6s animation */
        }

        @keyframes slowFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .skill-tag:hover {
            animation-play-state: paused;
            background: rgba(79, 172, 254, 0.15);
            border-color: var(--primary-glow);
            transform: scale(1.05) translateY(-2px);
        }

        /* --- UI ELEMENTS --- */
        h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }
        .gradient-text { background: linear-gradient(135deg, var(--primary-glow), var(--secondary-glow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        nav { position: fixed; top: 0; width: 100%; padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; background: rgba(3, 3, 5, 0.8); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid var(--glass-border); }
        .logo { font-size: 22px; font-weight: 700; color: #fff; text-decoration: none; }
        
        section { padding: 100px 10%; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .hero h1 { font-size: clamp(40px, 8vw, 70px); line-height: 1.1; }
        .hero-avatar { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--primary-glow); margin-bottom: 20px; object-fit: cover; display: none; }
        
        .glass-card { background: var(--bg-surface); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 35px; height: 100%; }
        
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; margin-top: 40px; }
        .project-card { background: var(--bg-surface); border: 1px solid var(--glass-border); border-radius: 16px; overflow: hidden; transition: 0.4s; }
        .project-card:hover { border-color: var(--primary-glow); transform: translateY(-8px); }
        .project-img { height: 200px; background-size: cover; background-position: center; }
        .project-content { padding: 25px; }

        .scroll-down { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: 24px; color: var(--text-muted); animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0) translateX(-50%); } 40% { transform: translateY(-10px) translateX(-50%); } }

        .reveal { opacity: 0; transform: translateY(20px); transition: 1s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div id="tech-canvas"></div>
    <div class="bg-grid"></div>

    <nav>
        <a href="#" class="logo" id="navLogo">Dev.</a>
        <div style="display: flex; gap: 25px;">
            <a href="#about" style="color: var(--text-muted); text-decoration: none; font-size: 14px;">About</a>
            <a href="#projects" style="color: var(--text-muted); text-decoration: none; font-size: 14px;">Projects</a>
        </div>
    </nav>

    <section class="hero" id="home">
        <div class="reveal active">
            <img id="displayPhoto" class="hero-avatar" src="" alt="Profile">
            <div id="displayCourse" style="color: var(--secondary-glow); font-size: 14px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px;"></div>
            <h1>Hi, I'm <span id="displayName" style="color:#fff;">User</span>.<br>I specialize in <span class="gradient-text" id="typewriter"></span></h1>
            <p id="displayJourney" style="max-width: 600px; color: var(--text-muted); margin-top: 20px; font-size: 17px;"></p>
        </div>
        <a href="#about" class="scroll-down"><i class="fa-solid fa-arrow-down"></i></a>
    </section>

    <section id="about">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px;">
            <div class="glass-card reveal">
                <h3 style="margin-bottom: 20px;">Technical Arsenal</h3>
                <div id="skillsContainer"></div>
            </div>
            <div class="glass-card reveal">
                <h3 style="margin-bottom: 20px;">Focused Areas</h3>
                <p style="color: var(--text-muted);">Developing intelligent systems through Code, Machine Learning architectures, and Robotics integration.</p>
            </div>
        </div>
    </section>

    <section id="projects">
        <h2 class="reveal">Featured Work</h2>
        <div class="projects-grid" id="projectsContainer"></div>
    </section>

    <footer style="padding: 60px; text-align: center; border-top: 1px solid var(--glass-border);">
        <p id="footerName" style="color: var(--text-muted); font-size: 14px;"></p>
    </footer>

    <script>
        // 1. REFINED BACKGROUND GENERATOR (ML, CODE, ROBOTICS)
        function initBackground() {
            const canvas = document.getElementById('tech-canvas');
            const codeElements = ['{ }', '</>', '[]', '=>', 'null', 'ptr'];
            const mlElements = ['Σ', 'μ', 'θ', 'λ', 'W', 'b'];
            
            // Create 40 elements for full coverage
            for (let i = 0; i < 40; i++) {
                const el = document.createElement('div');
                const type = Math.random();
                
                if (type < 0.33) {
                    el.className = 'bg-element';
                    el.innerText = codeElements[Math.floor(Math.random() * codeElements.length)];
                } else if (type < 0.66) {
                    el.className = 'bg-element ml-node';
                } else {
                    el.className = 'bg-element';
                    el.innerText = mlElements[Math.floor(Math.random() * mlElements.length)];
                }

                el.style.left = Math.random() * 100 + 'vw';
                el.style.fontSize = (Math.random() * 15 + 10) + 'px';
                el.style.animationDuration = (Math.random() * 20 + 15) + 's';
                el.style.animationDelay = (Math.random() * 10) + 's';
                canvas.appendChild(el);
            }
        }

        // 2. DATA LOADING & RESTORATION
        let typewriterWords = [];
        document.addEventListener("DOMContentLoaded", () => {
            initBackground();
            fetch('data.json')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('navLogo').innerText = data.profile.fullName.split(' ')[0] + '.';
                    document.getElementById('displayName').innerText = data.profile.fullName;
                    document.getElementById('displayCourse').innerText = data.profile.courseTitle;
                    document.getElementById('displayJourney').innerText = data.profile.journeyText;
                    document.getElementById('footerName').innerText = `© ${new Date().getFullYear()} ${data.profile.fullName}`;
                    
                    if(data.profile.photoUrl) {
                        const img = document.getElementById('displayPhoto');
                        img.src = data.profile.photoUrl;
                        img.style.display = 'block';
                    }

                    typewriterWords = data.typewriterWords || ["Software Engineering"];
                    startTypewriter();

                    // Skills Rendering
                    const skillContainer = document.getElementById('skillsContainer');
                    data.skills.forEach(cat => {
                        let div = document.createElement('div');
                        div.style.marginBottom = "20px";
                        div.innerHTML = `<small style="color:var(--primary-glow); display:block; margin-bottom:8px; font-weight:bold;">${cat.category}</small>`;
                        cat.items.forEach(s => {
                            const delay = (Math.random() * -5).toFixed(2);
                            div.innerHTML += `<span class="skill-tag" style="animation-delay: ${delay}s;"><i class="${s.icon}"></i> ${s.name}</span>`;
                        });
                        skillContainer.appendChild(div);
                    });

                    // Projects Rendering
                    const projContainer = document.getElementById('projectsContainer');
                    data.projects.forEach(p => {
                        projContainer.innerHTML += `
                            <div class="project-card reveal">
                                <div class="project-img" style="background-image: url('${p.imageUrl}')"></div>
                                <div class="project-content">
                                    <h4>${p.title}</h4>
                                    <p style="font-size:13px; color:var(--text-muted); margin: 15px 0;">${p.description}</p>
                                    <a href="${p.linkUrl}" target="_blank" style="color:var(--primary-glow); text-decoration:none; font-size:14px; font-weight:600;">Explore <i class="fa-solid fa-arrow-right"></i></a>
                                </div>
                            </div>
                        `;
                    });
                });
        });

        // 3. TYPEWRITER ENGINE
        let wordIdx = 0, charIdx = 0, isDeleting = false;
        function startTypewriter() {
            const el = document.getElementById('typewriter');
            if(!el) return;
            const current = typewriterWords[wordIdx];
            el.textContent = isDeleting ? current.substring(0, charIdx - 1) : current.substring(0, charIdx + 1);
            charIdx = isDeleting ? charIdx - 1 : charIdx + 1;

            let speed = isDeleting ? 40 : 100;
            if (!isDeleting && charIdx === current.length) { speed = 2000; isDeleting = true; }
            else if (isDeleting && charIdx === 0) { isDeleting = false; wordIdx = (wordIdx + 1) % typewriterWords.length; speed = 500; }
            setTimeout(startTypewriter, speed);
        }

        // 4. SCROLL ANIMATION
        window.addEventListener('scroll', () => {
            document.querySelectorAll('.reveal').forEach(el => {
                if (el.getBoundingClientRect().top < window.innerHeight - 50) el.classList.add('active');
            });
        });
    </script>
</body>
</html>
