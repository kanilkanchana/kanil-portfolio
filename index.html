<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | AI & Robotics</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root { 
            --bg-base: #030305; 
            --primary-glow: #4facfe; 
            --secondary-glow: #00f2fe; 
            --text-main: #f8f9fa; 
            --text-muted: #a0a0ab; 
            --glass-border: rgba(255, 255, 255, 0.08); 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background-color: var(--bg-base); color: var(--text-main); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* === SUBTLE TECH BACKGROUND === */
        #tech-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0;
            pointer-events: none;
            opacity: 0.12; /* Very subtle transparency */
        }
        .bg-symbol {
            position: absolute;
            font-family: 'Space Grotesk', monospace;
            color: var(--primary-glow);
            animation: driftUp linear infinite;
        }
        @keyframes driftUp {
            0% { transform: translateY(110vh); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        /* === SKILL ICON ANIMATION ONLY === */
        .skill-tag { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid var(--glass-border); 
            padding: 8px 16px; border-radius: 8px; 
            display: inline-flex; align-items: center; gap: 10px; margin: 5px;
            transition: 0.3s;
        }
        /* Only the icon inside moves */
        .skill-tag i {
            color: var(--secondary-glow);
            animation: iconPulse 3s infinite ease-in-out;
        }
        @keyframes iconPulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.2); opacity: 1; }
        }
        .skill-tag:hover { background: rgba(79, 172, 254, 0.1); border-color: var(--primary-glow); }

        /* --- UI STRUCTURE --- */
        nav, section, footer { position: relative; z-index: 10; }
        h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }
        .gradient-text { background: linear-gradient(135deg, var(--primary-glow), var(--secondary-glow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        nav { position: fixed; top: 0; width: 100%; padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; background: rgba(3, 3, 5, 0.8); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid var(--glass-border); }
        .logo { font-size: 22px; font-weight: 700; color: #fff; text-decoration: none; }
        
        section { padding: 120px 10%; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .hero h1 { font-size: clamp(35px, 7vw, 65px); line-height: 1.1; margin-bottom: 20px; }
        .hero-avatar { width: 110px; height: 110px; border-radius: 50%; border: 2px solid var(--primary-glow); margin-bottom: 20px; object-fit: cover; display: none; }
        
        .glass-card { background: rgba(15, 15, 20, 0.7); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 35px; }
        
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-top: 40px; }
        .project-card { background: rgba(10, 10, 15, 0.8); border: 1px solid var(--glass-border); border-radius: 15px; overflow: hidden; transition: 0.3s; }
        .project-card:hover { border-color: var(--primary-glow); transform: translateY(-5px); }
        .project-img { height: 200px; background-size: cover; background-position: center; }
        .project-content { padding: 20px; }

        .reveal { opacity: 0; transform: translateY(20px); transition: 0.8s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div id="tech-bg"></div>

    <nav>
        <a href="#" class="logo" id="navLogo">PORTFOLIO</a>
        <div style="display: flex; gap: 20px;">
            <a href="#about" style="color: var(--text-muted); text-decoration: none; font-size: 14px;">About</a>
            <a href="#projects" style="color: var(--text-muted); text-decoration: none; font-size: 14px;">Projects</a>
        </div>
    </nav>

    <section class="hero" id="home">
        <div class="reveal active">
            <img id="displayPhoto" class="hero-avatar" src="" alt="Profile">
            <div id="displayCourse" style="color: var(--secondary-glow); font-size: 13px; letter-spacing: 2px; margin-bottom: 10px;"></div>
            <h1>Hi, I'm <span id="displayName" style="color:#fff;">...</span>.<br>I specialize in <span class="gradient-text" id="typewriter"></span></h1>
            <p id="displayJourney" style="max-width: 600px; color: var(--text-muted); margin-top: 20px; font-size: 16px;"></p>
        </div>
    </section>

    <section id="about">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px;">
            <div class="glass-card reveal">
                <h3 style="margin-bottom: 20px; font-size: 22px;">Technical Skills</h3>
                <div id="skillsContainer"></div>
            </div>
            <div class="glass-card reveal" style="display: flex; flex-direction: column; justify-content: center;">
                <h3 style="margin-bottom: 15px;">Development Focus</h3>
                <p style="color: var(--text-muted);">Integrating clean code with intelligent Machine Learning models and Robotics automation.</p>
            </div>
        </div>
    </section>

    <section id="projects">
        <h2 class="reveal" style="margin-bottom: 30px;">Featured Work</h2>
        <div class="projects-grid" id="projectsContainer"></div>
    </section>

    <footer style="padding: 50px; text-align: center; border-top: 1px solid var(--glass-border);">
        <p id="footerName" style="color: var(--text-muted); font-size: 13px;"></p>
    </footer>

    <script>
        // 1. GHOST TECH BACKGROUND (CODE, ML, ROBOTICS)
        function initTechBackground() {
            const bg = document.getElementById('tech-bg');
            const items = ['{ }', '</>', '🤖', '⚙️', '∑', 'μ', '0101', 'λ', 'ptr'];
            for (let i = 0; i < 35; i++) {
                let el = document.createElement('div');
                el.className = 'bg-symbol';
                el.innerText = items[Math.floor(Math.random() * items.length)];
                el.style.left = Math.random() * 100 + 'vw';
                el.style.fontSize = (Math.random() * 15 + 12) + 'px';
                el.style.animationDuration = (Math.random() * 25 + 15) + 's';
                el.style.animationDelay = (Math.random() * 15) + 's';
                bg.appendChild(el);
            }
        }

        // 2. DATA LOAD (ORIGINAL MAPPING)
        let typewriterWords = [];
        document.addEventListener("DOMContentLoaded", () => {
            initTechBackground();
            fetch('data.json')
                .then(res => res.json())
                .then(data => {
                    // Mapping original JSON keys
                    document.getElementById('navLogo').innerText = data.profile.fullName.split(' ')[0].toUpperCase();
                    document.getElementById('displayName').innerText = data.profile.fullName;
                    document.getElementById('displayCourse').innerText = data.profile.courseTitle;
                    document.getElementById('displayJourney').innerText = data.profile.journeyText;
                    document.getElementById('footerName').innerText = `© ${data.profile.fullName}`;
                    
                    if(data.profile.photoUrl) {
                        const img = document.getElementById('displayPhoto');
                        img.src = data.profile.photoUrl;
                        img.style.display = 'block';
                    }

                    typewriterWords = data.typewriterWords || ["Software Engineer"];
                    startTypewriter();

                    // Skills (Icon animation only)
                    const skillContainer = document.getElementById('skillsContainer');
                    data.skills.forEach(cat => {
                        let div = document.createElement('div');
                        div.style.marginBottom = "15px";
                        div.innerHTML = `<small style="color:var(--primary-glow); font-weight:bold; display:block; margin-bottom:5px;">${cat.category}</small>`;
                        cat.items.forEach(s => {
                            div.innerHTML += `<span class="skill-tag"><i class="${s.icon}"></i> ${s.name}</span>`;
                        });
                        skillContainer.appendChild(div);
                    });

                    // Projects
                    const projContainer = document.getElementById('projectsContainer');
                    data.projects.forEach(p => {
                        projContainer.innerHTML += `
                            <div class="project-card reveal">
                                <div class="project-img" style="background-image: url('${p.imageUrl}')"></div>
                                <div class="project-content">
                                    <h4 style="margin-bottom:8px;">${p.title}</h4>
                                    <p style="font-size:13px; color:var(--text-muted); margin-bottom:15px;">${p.description}</p>
                                    <a href="${p.linkUrl}" target="_blank" style="color:var(--primary-glow); text-decoration:none; font-size:13px; font-weight:bold;">View Project</a>
                                </div>
                            </div>
                        `;
                    });
                });
        });

        // 3. TYPEWRITER ENGINE
        let wordIdx = 0, charIdx = 0, isDeleting = false;
        function startTypewriter() {
            const el = document.getElementById('typewriter');
            const current = typewriterWords[wordIdx];
            el.textContent = isDeleting ? current.substring(0, charIdx - 1) : current.substring(0, charIdx + 1);
            charIdx = isDeleting ? charIdx - 1 : charIdx + 1;
            let speed = isDeleting ? 50 : 120;
            if (!isDeleting && charIdx === current.length) { speed = 2000; isDeleting = true; }
            else if (isDeleting && charIdx === 0) { isDeleting = false; wordIdx = (wordIdx + 1) % typewriterWords.length; speed = 600; }
            setTimeout(startTypewriter, speed);
        }

        // 4. SCROLL REVEAL
        window.addEventListener('scroll', () => {
            document.querySelectorAll('.reveal').forEach(el => {
                if (el.getBoundingClientRect().top < window.innerHeight - 50) el.classList.add('active');
            });
        });
    </script>
</body>
</html>
