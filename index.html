<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root { 
            --bg-base: #030305; 
            --bg-surface: rgba(15, 15, 18, 0.65); 
            --primary-glow: #4facfe; 
            --secondary-glow: #00f2fe; 
            --text-main: #f8f9fa; 
            --text-muted: #a0a0ab; 
            --glass-border: rgba(255, 255, 255, 0.08); 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        
        body { 
            background-color: var(--bg-base); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
            line-height: 1.6; 
        }

        /* === DYNAMIC TECH BACKGROUND === */
        .tech-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .tech-symbol {
            position: absolute;
            color: var(--primary-glow);
            font-family: 'Space Grotesk', monospace;
            opacity: 0;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(-10deg); opacity: 0; }
            20% { opacity: 0.2; }
            80% { opacity: 0.2; }
            100% { transform: translateY(-10vh) rotate(10deg); opacity: 0; }
        }

        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0;
            background-image: 
                linear-gradient(rgba(79, 172, 254, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(79, 172, 254, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: dynamicGrid 20s linear infinite;
        }

        @keyframes dynamicGrid {
            0% { background-position: 0px 0px; }
            100% { background-position: 50px 50px; }
        }

        nav, section, footer { position: relative; z-index: 10; }

        /* --- UI COMPONENTS --- */
        h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }
        .gradient-text { background: linear-gradient(135deg, var(--primary-glow), var(--secondary-glow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        nav { position: fixed; top: 0; width: 100%; padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; background: rgba(3, 3, 5, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 100; border-bottom: 1px solid var(--glass-border); }
        .logo { font-size: 24px; font-weight: 700; color: var(--text-main); text-decoration: none; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; transition: 0.3s; }
        .nav-links a:hover { color: var(--secondary-glow); }
        
        section { padding: 120px 10%; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .hero h1 { font-size: 65px; line-height: 1.1; margin-bottom: 20px; }
        .hero-avatar { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--primary-glow); margin-bottom: 20px; object-fit: cover; display: none; }
        
        /* === FLOATING SKILL TAGS === */
        .skill-tag { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); 
            padding: 8px 16px; border-radius: 6px; font-size: 13px; display: inline-flex; align-items: center; gap: 8px; 
            animation: floatShake 4s infinite ease-in-out;
        }
        @keyframes floatShake {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-5px) rotate(1deg); }
        }
        .skill-tag:hover { animation: none; transform: scale(1.1); border-color: var(--secondary-glow); background: rgba(79, 172, 254, 0.1); }

        .scroll-down { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); font-size: 28px; animation: bounce 2s infinite; color: var(--text-muted); }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0) translateX(-50%); } 40% { transform: translateY(-15px) translateX(-50%); } }

        .glass-card { background: var(--bg-surface); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 40px; }
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .project-card { background: var(--bg-surface); border-radius: 15px; overflow: hidden; border: 1px solid var(--glass-border); transition: 0.3s; }
        .project-card:hover { transform: translateY(-10px); border-color: var(--primary-glow); }
        .project-img { height: 200px; background-size: cover; background-position: center; }
        .project-content { padding: 20px; }

        .reveal { opacity: 0; transform: translateY(30px); transition: 0.8s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div class="tech-bg" id="techBg"></div>
    <div class="bg-grid"></div>

    <nav>
        <a href="#" class="logo" id="navLogo">Portfolio</a>
        <div class="nav-links">
            <a href="#about">About</a>
            <a href="#projects">Projects</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <section class="hero" id="home">
        <div class="reveal active">
            <img id="displayPhoto" class="hero-avatar" src="" alt="Profile">
            <div id="displayCourse" style="color: var(--secondary-glow); margin-bottom: 10px;"></div>
            <h1>Hi, I'm <span id="displayName" style="color:white;">User</span>.<br>I build <span class="gradient-text" id="typewriter"></span></h1>
            <div style="margin-top: 30px;">
                <a href="#projects" style="background: linear-gradient(135deg, var(--primary-glow), var(--secondary-glow)); padding: 12px 25px; border-radius: 8px; color: black; text-decoration: none; font-weight: bold;">View My Work</a>
            </div>
        </div>
        <a href="#about" class="scroll-down"><i class="fa-solid fa-chevron-down"></i></a>
    </section>

    <section id="about">
        <div class="reveal" style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px;">
            <div class="glass-card">
                <h3>About Me</h3>
                <p id="displayJourney" style="margin-top: 15px; color: var(--text-muted);"></p>
            </div>
            <div class="glass-card">
                <h3>Skills</h3>
                <div id="skillsContainer" style="margin-top: 15px;"></div>
            </div>
        </div>
    </section>

    <section id="projects">
        <h2 style="margin-bottom: 40px;">Projects</h2>
        <div class="projects-grid" id="projectsContainer"></div>
    </section>

    <footer style="text-align: center; padding: 50px;">
        <p id="footerName"></p>
    </footer>

    <script>
        // 1. Dynamic Tech Background Generator
        function initTechBg() {
            const bg = document.getElementById('techBg');
            const symbols = ['{ }', '</>', '0101', 'AI', 'ML', '🤖', '⚙️', 'function()', 'O(n)', '∑'];
            for(let i = 0; i < 30; i++) {
                let el = document.createElement('div');
                el.className = 'tech-symbol';
                el.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                el.style.left = Math.random() * 100 + 'vw';
                el.style.animationDuration = (Math.random() * 15 + 10) + 's';
                el.style.animationDelay = (Math.random() * 10) + 's';
                bg.appendChild(el);
            }
        }

        // 2. Original Data Loading Restore
        let typewriterWords = [];
        document.addEventListener("DOMContentLoaded", function() {
            initTechBg();
            fetch('data.json')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('navLogo').innerText = data.profile.fullName.split(' ')[0] + '.';
                    document.getElementById('displayName').innerText = data.profile.fullName;
                    document.getElementById('displayCourse').innerText = data.profile.courseTitle;
                    document.getElementById('displayJourney').innerText = data.profile.journeyText;
                    document.getElementById('footerName').innerText = data.profile.fullName;
                    
                    if(data.profile.photoUrl) {
                        const img = document.getElementById('displayPhoto');
                        img.src = data.profile.photoUrl;
                        img.style.display = 'block';
                    }

                    typewriterWords = data.typewriterWords || ["Developer"];
                    startTypewriter();

                    // Skills Restore
                    const skillCont = document.getElementById('skillsContainer');
                    data.skills.forEach(cat => {
                        let html = `<div style="margin-bottom:15px"><strong style="display:block;margin-bottom:5px;font-size:12px;color:var(--secondary-glow)">${cat.category}</strong>`;
                        cat.items.forEach(s => {
                            const delay = (Math.random() * 2).toFixed(2);
                            html += `<span class="skill-tag" style="margin:5px; animation-delay: -${delay}s;"><i class="${s.icon}"></i> ${s.name}</span>`;
                        });
                        html += `</div>`;
                        skillCont.innerHTML += html;
                    });

                    // Projects Restore
                    const projCont = document.getElementById('projectsContainer');
                    data.projects.forEach(p => {
                        projCont.innerHTML += `
                            <div class="project-card reveal">
                                <div class="project-img" style="background-image: url('${p.imageUrl}')"></div>
                                <div class="project-content">
                                    <h4>${p.title}</h4>
                                    <p style="font-size:13px; color:var(--text-muted); margin: 10px 0;">${p.description}</p>
                                    <a href="${p.linkUrl}" target="_blank" style="color:var(--primary-glow); text-decoration:none; font-weight:bold;">View Project</a>
                                </div>
                            </div>
                        `;
                    });
                });
        });

        // 3. Typewriter Logic
        let wordIdx = 0, charIdx = 0, isDeleting = false;
        function startTypewriter() {
            const el = document.getElementById('typewriter');
            const current = typewriterWords[wordIdx];
            if (isDeleting) {
                el.textContent = current.substring(0, charIdx - 1);
                charIdx--;
            } else {
                el.textContent = current.substring(0, charIdx + 1);
                charIdx++;
            }

            let speed = isDeleting ? 50 : 150;
            if (!isDeleting && charIdx === current.length) { speed = 2000; isDeleting = true; }
            else if (isDeleting && charIdx === 0) { isDeleting = false; wordIdx = (wordIdx + 1) % typewriterWords.length; speed = 500; }
            setTimeout(startTypewriter, speed);
        }

        // 4. Scroll Reveal Logic
        window.addEventListener('scroll', () => {
            document.querySelectorAll('.reveal').forEach(el => {
                if (el.getBoundingClientRect().top < window.innerHeight - 50) el.classList.add('active');
            });
        });
    </script>
</body>
</html>
