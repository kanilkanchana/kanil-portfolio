<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Live Update</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0f0f13; --surface: #1a1a20; --primary: #4facfe; --text-main: #ffffff; --text-muted: #a0a0ab; --border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 25px; margin-bottom: 25px; }
        .card h2 { font-size: 18px; margin-bottom: 20px; color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px; color: white; font-size: 14px; }
        .btn-live { width: 100%; padding: 18px; background: #2ed573; color: #000; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; position: sticky; bottom: 20px; box-shadow: 0 5px 15px rgba(46, 213, 115, 0.3); }
        .auth-box { border-left: 4px solid #ff4757; background: rgba(255, 71, 87, 0.1); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-box">
            <label style="color:#ff4757;">GitHub Access Token</label>
            <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxx">
        </div>
        <div class="card">
            <h2>1. Profile Info</h2>
            <div class="form-group"><label>Full Name</label><input type="text" id="fullName"></div>
            <div class="form-group"><label>Course</label><input type="text" id="courseTitle"></div>
            <div class="form-group"><label>Photo URL</label><input type="text" id="photoUrl"></div>
            <div class="form-group"><label>Development Focus (About Section)</label><textarea id="devFocus" rows="2"></textarea></div>
            <div class="form-group"><label>The Journey</label><textarea id="journeyText" rows="5"></textarea></div>
        </div>
        <div class="card">
            <h2>2. JSON Data</h2>
            <div class="form-group"><label>Typewriter Words (Array)</label><textarea id="typewriterJson" rows="5" style="font-family:monospace;"></textarea></div>
            <div class="form-group"><label>Skills (JSON)</label><textarea id="skillsJson" rows="10" style="font-family:monospace;"></textarea></div>
            <div class="form-group"><label>Projects (JSON)</label><textarea id="projectsJson" rows="10" style="font-family:monospace;"></textarea></div>
        </div>
        <button class="btn-live" id="updateBtn" onclick="pushLiveUpdate()">PUSH LIVE TO GITHUB</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const response = await fetch('data.json');
            const data = await response.json();
            document.getElementById('fullName').value = data.profile.fullName;
            document.getElementById('courseTitle').value = data.profile.courseTitle;
            document.getElementById('photoUrl').value = data.profile.photoUrl;
            document.getElementById('journeyText').value = data.profile.journeyText;
            document.getElementById('devFocus').value = data.profile.devFocus || "";
            document.getElementById('typewriterJson').value = JSON.stringify(data.typewriterWords, null, 4);
            document.getElementById('skillsJson').value = JSON.stringify(data.skills, null, 4);
            document.getElementById('projectsJson').value = JSON.stringify(data.projects, null, 4);
        });

        async function pushLiveUpdate() {
            const token = document.getElementById('githubToken').value;
            const btn = document.getElementById('updateBtn');
            if(!token) return alert("Token Required!");
            
            const owner = "kanilkanchana";
            const repo = "kanil-portfolio";
            const path = "data.json";

            try {
                btn.innerText = "Processing...";
                const finalData = {
                    profile: {
                        fullName: document.getElementById('fullName').value,
                        courseTitle: document.getElementById('courseTitle').value,
                        photoUrl: document.getElementById('photoUrl').value,
                        journeyText: document.getElementById('journeyText').value,
                        devFocus: document.getElementById('devFocus').value,
                        contactEmail: "kanilkanchana98@gmail.com",
                        githubLink: "https://github.com/kanilkanchana"
                    },
                    typewriterWords: JSON.parse(document.getElementById('typewriterJson').value),
                    skills: JSON.parse(document.getElementById('skillsJson').value),
                    projects: JSON.parse(document.getElementById('projectsJson').value)
                };

                const getUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
                const getRes = await fetch(getUrl, { headers: { 'Authorization': `token ${token}` }});
                const fileData = await getRes.json();
                
                const putRes = await fetch(getUrl, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "Admin Update",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(finalData, null, 2)))),
                        sha: fileData.sha
                    })
                });

                if(putRes.ok) alert("Live Site Updated!");
            } catch (e) { alert("Error: " + e.message); }
            finally { btn.innerText = "PUSH LIVE TO GITHUB"; }
        }
    </script>
</body>
</html>
