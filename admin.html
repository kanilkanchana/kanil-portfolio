<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0f0f13; --surface: #1a1a20; --primary: #4facfe; --text-main: #ffffff; --text-muted: #a0a0ab; --border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 28px; color: var(--primary); margin-bottom: 10px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 30px; margin-bottom: 30px; }
        .card h2 { font-size: 18px; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 12px 15px; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border); border-radius: 8px; color: white; font-size: 15px; }
        input:focus, textarea:focus { outline: none; border-color: var(--primary); }
        .btn-live { display: block; width: 100%; padding: 18px; background: #2ed573; color: #000; font-size: 16px; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-live:hover { background: #26b360; transform: translateY(-2px); }
        .auth-box { border-left: 4px solid #ff4757; background: rgba(255, 71, 87, 0.1); padding: 15px; border-radius: 0 8px 8px 0; margin-bottom: 30px; }
        .auth-box input { border-color: #ff4757; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1><i class="fa-solid fa-satellite-dish"></i> Live Admin Dashboard</h1>
            <p>Push updates directly to your live portfolio on GitHub.</p>
        </div>

        <div class="auth-box">
            <label style="color: #ff4757;"><i class="fa-solid fa-lock"></i> GitHub Personal Access Token</label>
            <p style="font-size: 12px; color: #dcdcdc;">Paste your secret GitHub token here to authorize the live update.</p>
            <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
        </div>

        <div class="card">
            <h2>Profile Information</h2>
            <div class="form-group"><label>Full Name</label><input type="text" id="fullName" value="Kanil Kanchana"></div>
            <div class="form-group"><label>Course Title & Year</label><input type="text" id="courseTitle" value="BSc (Hons) Computer Science & AI"></div>
            <div class="form-group"><label>Profile Photo URL</label><input type="text" id="photoUrl" value="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?q=80&w=200&auto=format&fit=crop"></div>
            <div class="form-group"><label>About Me (Bio)</label><textarea id="bioText" rows="4">I am a second-year undergraduate at NIBM, currently completing my Higher National Diploma (HND) and transitioning into my final degree year. I specialize in bridging the gap between clean code, intelligent systems, and user-centric software architecture.</textarea></div>
        </div>

        <div class="card">
            <h2>Projects Database (JSON)</h2>
            <div class="form-group"><textarea id="projectsJson" rows="15" style="font-family: monospace; font-size: 13px;"></textarea></div>
        </div>

        <button class="btn-live" id="updateBtn" onclick="pushLiveUpdate()">
            <i class="fa-solid fa-cloud-arrow-up"></i> Push Live Update to GitHub
        </button>
    </div>

    <script>
        // Default Projects array
        const defaultProjects = [
            { "id": 1, "title": "Moviestream / CineVault", "description": "A premium movie database and streaming platform built from the ground up to provide a 100% ad-free cinematic experience for users.", "imageUrl": "https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=800&auto=format&fit=crop", "linkUrl": "http://moviestream.xo.je/", "linkText": "Live Demo" },
            { "id": 2, "title": "Wahera (Mobile App)", "description": "The official companion Android application for Moviestream, actively being developed using Android Studio to bring seamless streaming to mobile devices.", "imageUrl": "https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?q=80&w=800&auto=format&fit=crop", "linkUrl": "#", "linkText": "In Development" }
        ];
        document.getElementById('projectsJson').value = JSON.stringify(defaultProjects, null, 4);

        // --- GITHUB API LIVE UPDATE LOGIC ---
        async function pushLiveUpdate() {
            const token = document.getElementById('githubToken').value.trim();
            const btn = document.getElementById('updateBtn');
            
            if (!token) {
                alert("Please enter your GitHub Personal Access Token!");
                return;
            }

            // Your GitHub Details
            const owner = "kanilkanchana";
            const repo = "kanil-portfolio";
            const path = "data.json";

            try {
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Pushing to GitHub...';
                btn.style.pointerEvents = 'none';

                // 1. Gather all your data from the form
                const finalDatabase = {
                    profile: {
                        fullName: document.getElementById('fullName').value,
                        courseTitle: document.getElementById('courseTitle').value,
                        bioText: document.getElementById('bioText').value,
                        photoUrl: document.getElementById('photoUrl').value
                    },
                    projects: JSON.parse(document.getElementById('projectsJson').value)
                };

                // Convert data to Base64 (GitHub requires this format)
                const contentStr = JSON.stringify(finalDatabase, null, 2);
                const encodedContent = btoa(unescape(encodeURIComponent(contentStr)));

                // 2. Fetch the current 'SHA' of data.json (GitHub needs this to overwrite a file)
                const getUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
                const getResponse = await fetch(getUrl, {
                    headers: { 'Authorization': `token ${token}` }
                });
                
                if (!getResponse.ok) throw new Error("Could not find the original data.json file on GitHub. Check your token.");
                
                const fileData = await getResponse.json();
                const fileSha = fileData.sha;

                // 3. PUT (Upload) the new file back to GitHub
                const putResponse = await fetch(getUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: "Live update from Admin Dashboard",
                        content: encodedContent,
                        sha: fileSha
                    })
                });

                if (putResponse.ok) {
                    alert("Success! Your live portfolio has been updated. Give GitHub Pages 1-2 minutes to refresh the live site.");
                } else {
                    throw new Error("Failed to push update. Check your token permissions.");
                }

            } catch (error) {
                alert("Error: " + error.message);
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Push Live Update to GitHub';
                btn.style.pointerEvents = 'auto';
            }
        }
    </script>
</body>
</html>
